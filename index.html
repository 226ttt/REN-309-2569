<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Value Calculator</title>
    <style>
        :root { --primary: #6366f1; --bg: #f1f5f9; --card: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .card { background: var(--card); width: 100%; max-width: 500px; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); margin-bottom: 1.5rem; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #475569; }
        textarea { 
            width: 100%; height: 120px; padding: 12px; border: 2px solid #e2e8f0; border-radius: 12px; 
            font-size: 1rem; resize: none; box-sizing: border-box; transition: border-color 0.2s;
        }
        textarea:focus { outline: none; border-color: var(--primary); }
        .hint { font-size: 0.8rem; color: #94a3b8; margin-top: 5px; margin-bottom: 20px; }
        button { 
            width: 100%; padding: 14px; background: var(--primary); color: white; border: none; 
            border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer;
        }
        .results { 
            margin-top: 25px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; display: none;
        }
        .stat-box { 
            background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; text-align: center;
        }
        .full-width { grid-column: span 2; }
        .stat-label { font-size: 0.8rem; color: #64748b; margin-bottom: 5px; }
        .stat-value { font-family: monospace; font-size: 1.2rem; font-weight: bold; color: #1e293b; }
    </style>
</head>
<body>

<div class="card">
    <h2>📊 เครื่องคำนวณชุดข้อมูล</h2>
    
    <label>วางชุดตัวเลขที่นี่:</label>
    <textarea id="rawInput" placeholder="ตัวอย่าง: 10.5, 11.2, 10.8..."></textarea>
    <p class="hint">*รองรับการเว้นวรรค, ลูกน้ำ (,), หรือขึ้นบรรทัดใหม่ (ก๊อปจาก Excel ได้เลย)</p>

    <button onclick="processData()">คำนวณผลลัพธ์</button>

    <div class="results" id="resArea">
        <div class="stat-box full-width">
            <div class="stat-label">จำนวนข้อมูลที่พบ (n)</div>
            <div class="stat-value" id="resN">-</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">ค่าเฉลี่ย (Avg.)</div>
            <div class="stat-value" id="resAvg">-</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">ค่าเบี่ยงเบน (Std.)</div>
            <div class="stat-value" id="resStd">-</div>
        </div>
        <div class="stat-box full-width" style="border: 1px solid #c7d2fe; background: #eef2ff;">
            <div class="stat-label" style="color: #4338ca;">ความไม่แน่นอน (±2σ)</div>
            <div class="stat-value" style="color: #4338ca;" id="resUnc">-</div>
        </div>
    </div>
</div>

<script>
function processData() {
    const text = document.getElementById('rawInput').value;
    // ดึงเฉพาะตัวเลขออกมาจากข้อความ
    const numbers = text.match(/-?\d+(\.\d+)?/g);

    if (!numbers || numbers.length < 2) {
        alert("กรุณากรอกตัวเลขอย่างน้อย 2 ค่าขึ้นไปครับ");
        return;
    }

    const data = numbers.map(Number);
    const n = data.length;
    const avg = data.reduce((a, b) => a + b) / n;
    const std = Math.sqrt(data.map(x => Math.pow(x - avg, 2)).reduce((a, b) => a + b) / n);
    const unc = std * 2;

    document.getElementById('resN').innerText = n;
    document.getElementById('resAvg').innerText = avg.toFixed(4);
    document.getElementById('resStd').innerText = std.toFixed(4);
    document.getElementById('resUnc').innerText = unc.toFixed(4);
    document.getElementById('resArea').style.display = 'grid';
}
</script>

</body>
</html>
