<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uncertainty Calculator (รองรับ 2 มาตรฐาน)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; padding: 20px; display: flex; justify-content: center; align-items: center;
        }
        .container {
            background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 800px; width: 100%; padding: 40px;
        }
        h1 { text-align: center; color: #667eea; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 0.95em; }
        textarea {
            width: 100%; padding: 15px; border: 2px solid #e0e0e0; border-radius: 10px;
            font-size: 16px; font-family: 'Courier New', monospace; resize: vertical;
        }
        textarea:focus { outline: none; border-color: #667eea; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 25px 0; }
        select, input[type="number"] {
            padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 15px; width: 100%;
        }
        button {
            width: 100%; padding: 15px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: 600; cursor: pointer;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102,126,234,0.4); }
        .results { margin-top: 30px; padding: 25px; background: #f8f9fa; border-radius: 15px; display: none; }
        .results.show { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 15px; }
        .stat-box { background: white; padding: 15px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .stat-box .label { font-size: 0.85em; color: #666; margin-bottom: 5px; }
        .stat-box .value { font-size: 1.4em; font-weight: 700; color: #667eea; }
        .final-report {
            margin-top: 20px; padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border-radius: 10px; text-align: center; font-size: 1.3em; font-weight: 700;
        }
        .error { background: #fee; color: #c33; padding: 15px; border-radius: 8px; margin-top: 20px; display: none; }
        .error.show { display: block; }
        .method-note { background: #eef2ff; padding: 12px; border-radius: 8px; margin-top: 15px; font-size: 0.9em; color: #444; }
        @media (max-width: 600px) { .options, .stats-grid { grid-template-columns: 1fr; } .container { padding: 25px; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Uncertainty Calculator</h1>
        <p class="subtitle">คำนวณค่าเฉลี่ย, SD และความไม่แน่นอนการวัด (รองรับ 2 มาตรฐาน)</p>

        <textarea id="dataInput" rows="5" placeholder="ตัวอย่าง: 44.62 44.63 44.57 44.63"></textarea>

        <div class="options">
            <div>
                <label>📐 มาตรฐานการคำนวณ:</label>
                <select id="methodSelect">
                    <option value="sample" selected>มาตรฐานสากล (Sample SD, n-1)</option>
                    <option value="population">แบบพื้นฐาน (Population SD, n)</option>
                </select>
            </div>
            <div>
                <label>📏 Coverage Factor (k):</label>
                <select id="kSelect">
                    <option value="1">k = 1</option>
                    <option value="2" selected>k = 2</option>
                    <option value="3">k = 3</option>
                    <option value="custom">Custom</option>
                </select>
            </div>
        </div>
        <div id="customKBox" style="display:none; margin-bottom:20px;">
            <label>กำหนดค่า k เอง:</label>
            <input type="number" id="customK" step="0.1" value="2.0">
        </div>

        <button onclick="calculate()"> คำนวณผลลัพธ์</button>
        <div id="error" class="error"></div>

        <div id="results" class="results">
            <h2 style="color:#667eea; margin-bottom:15px;"> ผลการคำนวณ</h2>
            <div class="stats-grid">
                <div class="stat-box"><div class="label">n</div><div class="value" id="nVal">-</div></div>
                <div class="stat-box"><div class="label">Mean (x̄)</div><div class="value" id="meanVal">-</div></div>
                <div class="stat-box"><div class="label">Std Dev</div><div class="value" id="stdVal">-</div></div>
                <div class="stat-box"><div class="label">Standard Uncertainty (u)</div><div class="value" id="uVal">-</div></div>
            </div>
            <div style="margin-top:15px; display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #ddd;">
                <span>Expanded Uncertainty (U):</span>
                <span id="UVal" style="font-weight:700; color:#667eea;">-</span>
            </div>
            <div class="final-report" id="finalReport"></div>
            <div class="method-note" id="methodNote"></div>
        </div>
    </div>

    <script>
        document.getElementById('kSelect').addEventListener('change', function() {
            document.getElementById('customKBox').style.display = this.value === 'custom' ? 'block' : 'none';
        });

        function calculate() {
            const err = document.getElementById('error');
            const res = document.getElementById('results');
            err.classList.remove('show'); res.classList.remove('show');

            const raw = document.getElementById('dataInput').value.trim();
            const nums = raw.split(/[\s,\n]+/).filter(s => s.length > 0).map(Number);
            
            if (nums.some(isNaN) || nums.length < 2) {
                err.textContent = '⚠️ ต้องใส่ตัวเลขอย่างน้อย 2 ค่า';
                err.classList.add('show'); return;
            }

            const n = nums.length;
            const mean = nums.reduce((a,b)=>a+b,0)/n;
            const sumSq = nums.reduce((s,x)=> s + Math.pow(x-mean,2), 0);
            
            const method = document.getElementById('methodSelect').value;
            const isSample = method === 'sample';
            const std = Math.sqrt(sumSq / (isSample ? n-1 : n));
            
            let k = parseFloat(document.getElementById('kSelect').value);
            if(k === 'custom' || document.getElementById('kSelect').value === 'custom') {
                k = parseFloat(document.getElementById('customK').value) || 2;
            }

            // คำนวณ u และ U ตามประเภทวิธีที่เลือก
            let u, U;
            if (isSample) {
                // มาตรฐาน ISO GUM: u = s / √n
                u = std / Math.sqrt(n);
                U = k * u;
            } else {
                // แบบพื้นฐาน: ใช้ σ เป็น uncertainty โดยตรง (ไม่หาร √n)
                u = std; 
                U = k * std;
            }

            document.getElementById('nVal').textContent = n;
            document.getElementById('meanVal').textContent = mean.toFixed(4);
            document.getElementById('stdVal').textContent = std.toFixed(4);
            document.getElementById('uVal').textContent = u.toFixed(4);
            document.getElementById('UVal').textContent = U.toFixed(4);
            document.getElementById('finalReport').textContent = `${mean.toFixed(3)} ± ${U.toFixed(3)} (k=${k})`;
            
            const note = isSample 
                ? "✅ ใช้ Sample SD (n-1) และ u = s/√n ตามมาตรฐาน ISO GUM / สถิติกลุ่มตัวอย่าง" 
                : " ใช้ Population SD (n) และ U = k·σ แบบพื้นฐาน/ห้องเรียนบางแห่ง (ไม่หาร √n)";
            document.getElementById('methodNote').textContent = note;

            res.classList.add('show');
        }
    </script>
</body>
</html>
